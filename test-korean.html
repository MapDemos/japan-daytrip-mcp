<!DOCTYPE html>
<html>
<head>
  <title>Korean TTS Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { padding: 10px 20px; margin: 10px 0; font-size: 16px; }
    .voices { margin-top: 20px; }
    .voice-item { padding: 5px; margin: 2px 0; background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Korean TTS Voice Test</h1>

  <h2>Test Speech:</h2>
  <button onclick="testKorean()">🇰🇷 Test Korean Voice</button>
  <button onclick="testJapanese()">🇯🇵 Test Japanese Voice</button>
  <button onclick="testEnglish()">🇺🇸 Test English Voice</button>

  <h2>Available Voices on Your Mac:</h2>
  <div id="voices" class="voices"></div>

  <script>
    function listVoices() {
      const voices = speechSynthesis.getVoices();
      const voicesDiv = document.getElementById('voices');

      // Group by language
      const grouped = {};
      voices.forEach(voice => {
        const lang = voice.lang;
        if (!grouped[lang]) grouped[lang] = [];
        grouped[lang].push(voice);
      });

      let html = '<h3>Total voices: ' + voices.length + '</h3>';

      // Show Korean voices prominently
      if (grouped['ko-KR']) {
        html += '<h3 style="color: green;">✓ Korean (ko-KR) voices found:</h3>';
        grouped['ko-KR'].forEach(voice => {
          html += `<div class="voice-item" style="background: #d4edda;">
            <strong>${voice.name}</strong> - ${voice.lang} ${voice.localService ? '(Local)' : '(Remote)'}
          </div>`;
        });
      } else {
        html += '<h3 style="color: red;">✗ No Korean (ko-KR) voices found</h3>';
        html += '<p>You may need to enable Korean voices in System Settings > Accessibility > Spoken Content > System Voices</p>';
      }

      // Show Japanese voices
      if (grouped['ja-JP']) {
        html += '<h3>Japanese (ja-JP) voices:</h3>';
        grouped['ja-JP'].forEach(voice => {
          html += `<div class="voice-item">
            <strong>${voice.name}</strong> - ${voice.lang} ${voice.localService ? '(Local)' : '(Remote)'}
          </div>`;
        });
      }

      // Show English voices
      if (grouped['en-US']) {
        html += '<h3>English (en-US) voices (first 5):</h3>';
        grouped['en-US'].slice(0, 5).forEach(voice => {
          html += `<div class="voice-item">
            <strong>${voice.name}</strong> - ${voice.lang} ${voice.localService ? '(Local)' : '(Remote)'}
          </div>`;
        });
      }

      voicesDiv.innerHTML = html;
    }

    function speak(text, lang) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang;

      // Try to find a voice for this language
      const voices = speechSynthesis.getVoices();
      const voice = voices.find(v => v.lang === lang);
      if (voice) {
        utterance.voice = voice;
        console.log('Using voice:', voice.name, voice.lang);
      } else {
        console.log('No voice found for', lang, '- using default');
      }

      speechSynthesis.speak(utterance);
    }

    function testKorean() {
      speak('안녕하세요. 한국어 음성 테스트입니다.', 'ko-KR');
    }

    function testJapanese() {
      speak('こんにちは。日本語の音声テストです。', 'ja-JP');
    }

    function testEnglish() {
      speak('Hello. This is an English voice test.', 'en-US');
    }

    // Load voices when ready
    speechSynthesis.addEventListener('voiceschanged', listVoices);
    if (speechSynthesis.getVoices().length > 0) {
      listVoices();
    }

    // Also load on page load
    setTimeout(listVoices, 1000);
  </script>
</body>
</html>
