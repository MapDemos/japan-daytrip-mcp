name: Deploy to demos.mapbox.com

on:
  push:
    branches:
      - publisher-production
  workflow_dispatch: # Allows manual triggering

env:
  # Automatically uses the repository name
  DEMO_NAME: ${{ github.event.repository.name }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          echo "Deploying to s3://demos.mapbox.com/${{ env.DEMO_NAME }}/"
          aws s3 sync ./build s3://demos.mapbox.com/${{ env.DEMO_NAME }}/ \
            --delete \
            --cache-control "public, max-age=3600" \
            --acl public-read

      - name: Invalidate CloudFront cache (if configured)
        if: secrets.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ env.DEMO_NAME }}/*"
        continue-on-error: true

      - name: Deployment complete
        run: |
          echo "✅ Deployed successfully!"
          echo "🌐 URL: https://demos.mapbox.com/${{ env.DEMO_NAME }}/"
