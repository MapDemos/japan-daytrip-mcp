<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan AI Travel Agent</title>
  <meta name="description" content="AI-powered Japan travel agent with Mapbox and Claude">

  <!-- Content Security Policy for XSS Protection -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval' https://api.mapbox.com https://unpkg.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://api.mapbox.com;
    img-src 'self' data: https: blob:;
    media-src 'self' blob:;
    connect-src 'self' https://api.mapbox.com https://events.mapbox.com https://unpkg.com https://cdn.jsdelivr.net https://*.lambda-url.us-east-1.on.aws https://www.j-jti.com;
    font-src 'self' data:;
    worker-src 'self' blob:;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    upgrade-insecure-requests;
  ">

  <!-- Favicon -->
  <link rel="shortcut icon" href="https://static-assets.mapbox.com/branding/favicon/v1/favicon.ico" type="image/x-icon"/>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

  <!-- Mapbox Map Tools MCP Library -->
  <script src="https://unpkg.com/mapbox-map-tools-mcp@latest/src/mapbox-map-tools.js"></script>

  <!-- DOMPurify for XSS Protection -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <!-- Application Styles -->
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <h1 id="app-title">🇯🇵 AI旅行エージェント</h1>
        <p id="app-subtitle" class="subtitle">日本全国の食べる・買う・遊ぶ・見るスポットを発見</p>
      </div>
      <div class="header-right">
        <div id="token-counter" class="token-counter" title="Conversation token usage">
          <span id="token-count">0k / 200k (0%)</span>
        </div>
        <button id="tts-toggle" class="tts-toggle-btn" title="Auto-speak responses">
          <span id="tts-icon">🔇</span>
        </button>
        <select id="lang-dropdown" class="lang-dropdown" title="Select language">
          <!-- Options populated by JavaScript -->
        </select>
      </div>
    </div>
  </header>

  <!-- Main Application Container -->
  <div class="app-container">

    <!-- Chat Panel -->
    <div class="chat-panel">

      <!-- Chat Messages -->
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome message will be added by JavaScript -->
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <input
            type="text"
            id="chatInput"
            class="chat-input"
            placeholder="日本の場所について聞いてください...（例：「渋谷のレストランを探して」）"
            autocomplete="off"
          />
          <button id="micBtn" class="mic-btn" title="音声入力 / Voice input">
            <span id="micIcon">🎤</span>
          </button>
          <button id="sendBtn" class="send-btn">
            <span id="sendBtnText">送信</span>
          </button>
        </div>
      </div>

      <!-- Thinking Display -->
      <div class="thinking-display" id="thinkingDisplay" style="display: none;">
        <div class="thinking-header">
          <div class="thinking-spinner"></div>
          <span class="thinking-icon">🤔</span>
        </div>
        <div class="thinking-steps" id="thinkingSteps"></div>
      </div>

    </div>

    <!-- Map Panel -->
    <div class="map-panel">

      <!-- Map Container -->
      <div id="map" class="map-container"></div>

      <!-- Map Controls -->
      <div class="map-controls">
        <button id="clearChatBtn" class="control-btn" title="Clear conversation">
          <span class="icon">💬</span>
          <span class="label" data-i18n="clearChat">チャットをクリア</span>
        </button>
      </div>

    </div>

  </div>

  <!-- POI Details Modal -->
  <div class="modal" id="poiModal" style="display: none;">
    <div class="modal-content poi-modal-content">
      <div class="modal-header">
        <h3 id="poiName">POI Details</h3>
        <button class="modal-close" id="closePoiModal">×</button>
      </div>
      <div class="modal-body poi-modal-body">
        <div id="poiPhoto" class="poi-photo" style="display: none;">
          <img id="poiPhotoImg" src="" alt="POI Photo">
        </div>
        <dl class="poi-details">
          <dt>住所：</dt>
          <dd id="poiAddress">-</dd>
          <dt>電話：</dt>
          <dd id="poiPhone">-</dd>
          <dt>営業時間：</dt>
          <dd id="poiHours">-</dd>
          <dt>おすすめ：</dt>
          <dd id="poiRating">-</dd>
          <dt>料金：</dt>
          <dd id="poiPrice">-</dd>
        </dl>
        <div id="poiSummary" class="poi-summary"></div>
      </div>
    </div>
  </div>

  <!-- Error Modal -->
  <div class="modal" id="errorModal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚠️ Error</h3>
        <button class="modal-close" id="closeErrorModal">×</button>
      </div>
      <div class="modal-body" id="errorMessage"></div>
    </div>
  </div>

  <!-- Thinking Overlay Modal -->
  <div class="thinking-overlay" id="thinkingOverlay" style="display: none;">
    <div class="thinking-overlay-content">
      <div class="thinking-overlay-spinner"></div>
      <h2 class="thinking-overlay-title" id="thinkingOverlayTitle" data-i18n="thinking.overlayTitle">🤔 検索中...</h2>
      <p class="thinking-overlay-question" id="thinkingOverlayQuestion"></p>
      <div class="thinking-overlay-status">
        <div class="thinking-status-line">
          <span class="thinking-status" id="thinkingOverlayStatus">データベースを検索しています...</span>
          <span class="thinking-timer" id="thinkingOverlayTimer">0s</span>
        </div>
      </div>
      <div class="thinking-overlay-progress">
        <div class="thinking-overlay-progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Application Script (ES6 Module) -->
  <script src="./index.js" type="module"></script>

</body>
</html>
